<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M8 Assignment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
    <div class="container py-4">
        <header class="mb-4">
            <h1 class="display-6 mb-2">M8 Assignment</h1>
            <p class="text-muted mb-0">
                Part 1 writes its results to the browser console. Part 2 provides an employee management UI with localStorage persistence.
            </p>
        </header>

        <section class="card shadow-sm mb-4">
            <div class="card-body">
                <h2 class="h4 mb-3">Employee Management System</h2>
                <form id="employeeForm" class="row g-3">
                    <div class="col-md-2">
                        <label for="empId" class="form-label">ID</label>
                        <input type="number" id="empId" class="form-control" min="1" required />
                    </div>
                    <div class="col-md-3">
                        <label for="empName" class="form-label">Name</label>
                        <input type="text" id="empName" class="form-control" required />
                    </div>
                    <div class="col-md-2">
                        <label for="empExt" class="form-label">Extension</label>
                        <input type="number" id="empExt" class="form-control" min="1000" max="9999" required />
                    </div>
                    <div class="col-md-3">
                        <label for="empEmail" class="form-label">Email</label>
                        <input type="email" id="empEmail" class="form-control" required />
                    </div>
                    <div class="col-md-2">
                        <label for="empDept" class="form-label">Department</label>
                        <input type="text" id="empDept" class="form-control" required />
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">Add Employee</button>
                        <button type="reset" class="btn btn-outline-secondary ms-2">Clear</button>
                    </div>
                </form>
            </div>
        </section>

        <section class="card shadow-sm">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="h4 mb-0">Employees</h2>
                    <span class="badge text-bg-secondary" id="employeeCount">0 Employees</span>
                </div>

                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Extension</th>
                                <th>Email</th>
                                <th>Department</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="employeeTableBody"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <script src="part1-arrays.js"></script>
    <script src="part2-employee-management.js"></script>
</body>
</html>
